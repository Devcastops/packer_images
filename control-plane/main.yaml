---


- name: Consul_base
  hosts: all
  become: true
  roles:
    - role: dco.consul.base
    - role: dco.vault.install
    - role: dco.vault.agent

- name: Consul Server
  hosts: all
  become: true
  vars:
    type: server
  roles:
    - role: dco.consul.agent
    - role: dco.consul.server

- name: Vault
  hosts: all
  become: true
  roles:
    - role: dco.vault.server
    - role: dco.vault.init
    - role: dco.vault.ca_management

