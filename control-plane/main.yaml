---


- name: Consul_base
  hosts: all
  become: true
  roles:
    - role: dco.consul.base
    - role: dco.vault.install
    - role: dco.vault.agent

- name: Consul Server
  hosts: all
  become: true
  vars:
    type: server
  roles:
    - role: dco.consul.agent
    - role: dco.consul.server

- name: Vault
  hosts: all
  become: true
  roles:
    - role: dco.vault.server
    - role: dco.vault.init
    - role: dco.vault.ca_management
    - role: dco.vault.consul_registration

- name: create the trigger file
  hosts: all
  become: true
  tasks:
  - name: Create trigger file
    file:
      path: "{{ trigger_file_location }}"
      state: touch